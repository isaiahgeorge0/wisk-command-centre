name: Property Insights

on:
  schedule:
    # 09:00 UTC every Sunday
    - cron: '0 9 * * 0'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Winston property insights
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://app.wiskapp.com/api/properties/generate-insights" \
            -H "Authorization: Bearer ${{ secrets.PROPERTY_ALERTS_SECRET }}" \
            -H "Content-Type: application/json")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Response: $body"
          echo "HTTP status: $status"
          if [ "$status" != "200" ]; then
            echo "Property insights generation failed with status $status"
            exit 1
          fi
